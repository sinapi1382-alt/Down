name: دانلودر با فایل لیست قابل دانلود

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک دانلود (فقط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: دریافت کدها
      uses: actions/checkout@v4
    
    - name: نصب ابزارها
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 zip
        
    - name: دانلود و پردازش
      run: |
        rm -rf downloads
        mkdir -p downloads
        cd downloads
        
        URL="${{ github.event.inputs.urls }}"
        
        echo "================================"
        echo "Downloading: $URL"
        echo "================================"
        
        FILENAME=$(basename "$URL" | cut -d '?' -f1 | cut -d '#' -f1)
        aria2c -x 16 -s 16 -k 1M \
               --console-log-level=error \
               --allow-overwrite=true \
               -o "$FILENAME" \
               "$URL"
        
        echo ""
        echo "================================"
        echo "Creating zip file"
        echo "================================"
        
        if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
          SIZE=$(du -h "$FILENAME" | cut -f1)
          
          if [ -n "${{ github.event.inputs.password }}" ]; then
            zip -P "${{ github.event.inputs.password }}" "download.zip" "$FILENAME"
            echo "Created: download.zip with password"
          else
            zip "download.zip" "$FILENAME"
            echo "Created: download.zip"
          fi
          
          rm "$FILENAME"
        else
          echo "Download failed!"
          exit 1
        fi
        
        echo ""
        echo "================================"
        echo "Creating list file"
        echo "================================"
        
        echo "=========================================" > list.txt
        echo "Downloaded Files List" >> list.txt
        echo "=========================================" >> list.txt
        echo "" >> list.txt
        echo "Date: $(date '+%Y-%m-%d %H:%M:%S')" >> list.txt
        echo "Source URL: $URL" >> list.txt
        echo "" >> list.txt
        echo "Files:" >> list.txt
        echo "----------------------------------------" >> list.txt
        ls -lh *.zip >> list.txt
        echo "" >> list.txt
        echo "Password: ${{ github.event.inputs.password || 'No password' }}" >> list.txt
        echo "Total size: $(du -sh . | cut -f1)" >> list.txt
        echo "=========================================" >> list.txt
        
        cat list.txt
        
        cd ..
        
        echo ""
        echo "Saving to repository..."
        git config user.name "github-actions[bot]"
        git config user.email "actions@github.com"
        git add downloads/
        git commit -m "Add downloaded files $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
        git push
        
        echo ""
        echo "================================"
        echo "Done!"
        echo "================================"
        echo "Files in downloads folder:"
        ls -la downloads/
        echo ""
        echo "To download list file:"
        echo "Go to repository -> downloads folder -> list.txt -> Download button"
        echo "================================"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Downloaded-Files
        path: downloads/

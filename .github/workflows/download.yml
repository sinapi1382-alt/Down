name: دانلودر با تقسیم خودکار ۵۰ مگابایت

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کن)'
        required: true
        type: string
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: دریافت کدهای ریپازیتوری
      uses: actions/checkout@v4
    
    - name: نصب ابزارهای مورد نیاز
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 zip unzip rar
    
    - name: ساخت پوشه و دانلود
      run: |
        # پاک کردن پوشه قبلی
        rm -rf downloads
        mkdir -p downloads
        
        cd downloads
        
        # دانلود هر لینک
        for URL in ${{ github.event.inputs.urls }}; do
          echo "📥 دانلود: $URL"
          FILENAME=$(basename "$URL" | cut -d '?' -f1 | cut -d '#' -f1)
          
          if [[ "$URL" == http* ]]; then
            aria2c -x 16 -s 16 -k 1M \
                   --console-log-level=error \
                   --allow-overwrite=true \
                   -o "$FILENAME" \
                   "$URL"
          fi
        done
        
        cd ..
        
        # تقسیم فایل‌ها به بخش‌های 50 مگابایتی
        echo "✂️ تقسیم فایل‌ها به بخش‌های 50 مگابایتی..."
        cd downloads
        
        for FILE in *; do
          if [ -f "$FILE" ] && [ ! "$FILE" == "*.zip" ]; then
            # گرفتن حجم فایل به بایت
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$((SIZE / 1024 / 1024))
            
            if [ $SIZE_MB -gt 50 ]; then
              echo "📦 فایل $FILE حجم: ${SIZE_MB}MB - در حال تقسیم..."
              
              # زیپ کردن با رمز اگه داده شده
              if [ -n "${{ github.event.inputs.password }}" ]; then
                zip -P "${{ github.event.inputs.password }}" -s 50m -r "${FILE}.zip" "$FILE"
                rm "$FILE"
                echo "✅ تقسیم شد: ${FILE}.zip (بخش‌های 50 مگابایتی با رمز)"
              else
                zip -s 50m -r "${FILE}.zip" "$FILE"
                rm "$FILE"
                echo "✅ تقسیم شد: ${FILE}.zip (بخش‌های 50 مگابایتی)"
              fi
            else
              # فایل کوچک‌تر از 50 مگابایت
              if [ -n "${{ github.event.inputs.password }}" ]; then
                zip -P "${{ github.event.inputs.password }}" "${FILE}.zip" "$FILE"
                rm "$FILE"
              fi
            fi
          fi
        done
        
        cd ..
        
        # ذخیره در ریپازیتوری
        echo "💾 ذخیره فایل‌ها در ریپازیتوری..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add downloads/
        git commit -m "Add downloaded files $(date +'%Y-%m-%d %H:%M:%S')" || echo "تغییری برای کامیت وجود ندارد"
        git push
        
        echo "========================================="
        echo "✅ فایل‌ها در پوشه downloads ذخیره شدند"
        echo "========================================="
        ls -la downloads/
    
    - name: آپلود به عنوان Artifact (برای دانلود راحت)
      uses: actions/upload-artifact@v4
      with:
        name: فایل‌های-۵۰مگابایتی
        path: downloads/

name: Download File from URL

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک دانلود (چند تا رو با فاصله جدا کن)'
        required: true
        type: string
      password:
        description: 'رمز فایل (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: دریافت کدها
      uses: actions/checkout@v4
    
    - name: نصب ابزارها
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 zip
        
    - name: ساخت پوشه دانلود و شروع دانلود
      run: |
        # اول پوشه رو بساز
        mkdir -p downloads
        
        # برو داخل پوشه
        cd downloads
        
        # حالا دانلود کن
        for URL in ${{ github.event.inputs.urls }}; do
          echo "📥 در حال دانلود: $URL"
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          aria2c -x 16 -s 16 -o "$FILENAME" "$URL"
          
          if [ -f "$FILENAME" ]; then
            echo "✅ دانلود شد: $FILENAME"
          else
            echo "❌ خطا در دانلود: $URL"
          fi
        done
        
        # برگرد به پوشه اصلی
        cd ..
        
        # اگه رمز داده شده بود، فایل رو رمزگذاری کن
        if [ -n "${{ github.event.inputs.password }}" ]; then
          echo "🔒 در حال رمزگذاری فایل‌ها..."
          cd downloads
          zip -P "${{ github.event.inputs.password }}" -r downloaded_files.zip .
          rm -f * 2>/dev/null || true
          mv downloaded_files.zip .
          cd ..
        fi
        
        # نشون بده چه فایل‌هایی داریم
        echo "📂 فایل‌های موجود در پوشه downloads:"
        ls -la downloads/
        
        # اگه پوشه خالیه، خطا بده
        if [ -z "$(ls -A downloads/)" ]; then
          echo "❌ خطا: پوشه downloads خالی است. دانلودی انجام نشده."
          exit 1
        fi
    
    - name: آپلود فایل‌ها
      uses: actions/upload-artifact@v4
      with:
        name: Downloads
        path: downloads/

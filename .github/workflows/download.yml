name: دانلودر با فایل لیست قابل دانلود

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک دانلود (فقط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: دریافت کدها
      uses: actions/checkout@v4
    
    - name: نصب ابزارها
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 zip
        
    - name: دانلود و پردازش
      run: |
        # پاک کردن پوشه قبلی
        rm -rf downloads
        mkdir -p downloads
        cd downloads
        
        URL="${{ github.event.inputs.urls }}"
        
        echo "========================================="
        echo "📥 دانلود از: $URL"
        echo "========================================="
        
        # دانلود فایل
        FILENAME=$(basename "$URL" | cut -d '?' -f1 | cut -d '#' -f1)
        aria2c -x 16 -s 16 -k 1M \
               --console-log-level=error \
               --allow-overwrite=true \
               -o "$FILENAME" \
               "$URL"
        
        echo ""
        echo "========================================="
        echo "📦 زیپ کردن فایل"
        echo "========================================="
        
        # زیپ کردن فایل دانلودی
        if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
          SIZE=$(du -h "$FILENAME" | cut -f1)
          
          if [ -n "${{ github.event.inputs.password }}" ]; then
            zip -P "${{ github.event.inputs.password }}" "دانلود.zip" "$FILENAME"
            echo "✅ فایل زیپ شد با رمز: دانلود.zip (حجم اصلی: $SIZE)"
          else
            zip "دانلود.zip" "$FILENAME"
            echo "✅ فایل زیپ شد: دانلود.zip (حجم اصلی: $SIZE)"
          fi
          
          # حذف فایل اصلی
          rm "$FILENAME"
        else
          echo "❌ خطا در دانلود"
          exit 1
        fi
        
        # ساختن فایل لیست (با فرمت txt برای دانلود آسان)
        echo "📋 ایجاد فایل لیست قابل دانلود..."
        
        cat > "لیست_دانلود.txt" << EOF
=========================================
لیست فایل‌های دانلود شده
=========================================

تاریخ: $(date '+%Y-%m-%d %H:%M:%S')
لینک اصلی: $URL

----------------------------------------
فایل‌های موجود:
----------------------------------------

$(ls -lh *.zip 2>/dev/null)

----------------------------------------
رمز فایل: ${{ github.event.inputs.password || 'بدون رمز' }}
حجم کل: $(du -sh . | cut -f1)
=========================================
EOF
        
        # نمایش محتوای لیست برای اطمینان
        cat "لیست_دانلود.txt"
        
        cd ..
        
        # ذخیره در ریپازیتوری
        echo ""
        echo "💾 ذخیره در ریپازیتوری..."
        git config user.name "github-actions[bot]"
        git config user.email "actions@github.com"
        git add downloads/
        git commit -m "Add downloaded files $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
        git push
        
        # نمایش نتیجه
        echo ""
        echo "========================================="
        echo "✅ دانلود کامل شد!"
        echo "========================================="
        echo "📂 فایل‌ها در پوشه downloads:"
        ls -la downloads/
        echo ""
        echo "📄 برای دانلود فایل لیست:"
        echo "به ریپازیتوری → پوشه downloads → کلیک روی لیست_دانلود.txt → دکمه Download"
        echo "========================================="
    
    - name: آپلود Artifact
      uses: actions/upload-artifact@v4
      with:
        name: فایل‌های-دانلود-شده
        path: downloads/

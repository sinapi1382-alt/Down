name: Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URL'
        required: true
        type: string
      password:
        description: 'Zip password (optional)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip
      
      - name: Download and process
        run: |
          rm -rf downloads
          mkdir -p downloads
          cd downloads
          
          URL="${{ inputs.urls }}"
          PASS="${{ inputs.password }}"
          
          echo "Downloading: $URL"
          
          FILENAME=$(basename "$URL" | cut -d '?' -f1)
          aria2c -x 16 -s 16 -o "$FILENAME" "$URL"
          
          if [ -f "$FILENAME" ]; then
            if [ -n "$PASS" ]; then
              zip -P "$PASS" "download.zip" "$FILENAME"
            else
              zip "download.zip" "$FILENAME"
            fi
            rm "$FILENAME"
          fi
          
          echo "File list:" > list.txt
          ls -lh >> list.txt
          echo "Password: $PASS" >> list.txt
          
          cd ..
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add files" || echo "No changes"
          git push
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Downloads
          path: downloads/

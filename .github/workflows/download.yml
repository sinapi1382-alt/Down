name: دانلودر حرفه‌ای فایل

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کن)'
        required: true
        type: string
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: دریافت کدهای ریپازیتوری
      uses: actions/checkout@v4
    
    - name: نصب ابزارهای مورد نیاز
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 zip unzip
        
    - name: اجرای دانلودر
      run: |
        # ساخت پوشه download اگه وجود نداشته باشه
        mkdir -p downloads
        
        # رفتن به داخل پوشه
        cd downloads
        
        # دانلود هر لینک
        for URL in ${{ github.event.inputs.urls }}; do
          echo "========================================="
          echo "📥 در حال دانلود: $URL"
          echo "========================================="
          
          # گرفتن نام فایل از لینک
          FILENAME=$(basename "$URL" | cut -d '?' -f1 | cut -d '#' -f1)
          
          # دانلود با aria2 (فقط لینک‌های http/https)
          if [[ "$URL" == http* ]]; then
            aria2c -x 16 -s 16 -k 1M \
                   --max-connection-per-server=16 \
                   --console-log-level=error \
                   --summary-interval=0 \
                   --allow-overwrite=true \
                   -o "$FILENAME" \
                   "$URL" || {
                     echo "❌ خطا در دانلود: $URL"
                     continue
                   }
          else
            echo "❌ لینک نامعتبر: $URL"
            continue
          fi
          
          # بررسی موفقیت دانلود
          if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
            SIZE=$(du -h "$FILENAME" | cut -f1)
            echo "✅ دانلود شد: $FILENAME (حجم: $SIZE)"
          else
            echo "❌ فایل دانلود نشد یا خالی است: $FILENAME"
          fi
          
          echo ""
        done
        
        # برگشت به پوشه اصلی
        cd ..
        
        # رمزگذاری با زیپ اگه رمز داده شده بود
        if [ -n "${{ github.event.inputs.password }}" ]; then
          echo "========================================="
          echo "🔒 رمزگذاری فایل‌ها با رمز وارد شده"
          echo "========================================="
          cd downloads
          zip -P "${{ github.event.inputs.password }}" -r protected_files.zip . -x "*.zip"
          find . -type f ! -name "protected_files.zip" -delete
          cd ..
        fi
        
        # نمایش نتیجه نهایی
        echo "========================================="
        echo "📂 فایل‌های موجود در پوشه downloads:"
        echo "========================================="
        ls -la downloads/
        
    - name: آپلود فایل‌ها به عنوان Artifact
      uses: actions/upload-artifact@v4
      with:
        name: فایل‌های-دانلودی
        path: downloads/
        if-no-files-found: error
